<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Primavera — Galleria · Samuel Ferla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808;
      --dark: #111111;
      --amber: #c9a84c;
      --white: #f0ece4;
      --muted: rgba(240,236,228,0.45);
      --faint: rgba(240,236,228,0.15);
    }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--faint);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--white);
      text-decoration: none;
    }
    .back-link {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--amber); }

    .hero {
      padding: 140px 48px 60px;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      gap: 32px;
      flex-wrap: wrap;
    }
    .hero-left { }
    .hero-eyebrow {
      font-size: 9px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 12px;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 300;
      color: var(--white);
      margin-bottom: 8px;
    }
    .hero-sub {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0;
    }

    .gallery {
      padding: 48px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .gallery-item {
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: #111;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease, filter 0.3s;
      filter: brightness(0.9);
      aspect-ratio: 16/9;
    }
    .gallery-item:hover img {
      transform: scale(1.03);
      filter: brightness(1);
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.95);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      display: block;
    }
    .lightbox-close {
      position: fixed;
      top: 20px; right: 28px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 28px;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    .lightbox-close:hover { color: var(--white); }
    .lightbox-prev, .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: 32px;
      cursor: pointer;
      padding: 16px;
      transition: color 0.2s;
      line-height: 1;
    }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }
    .lightbox-prev:hover, .lightbox-next:hover { color: var(--white); }

    footer {
      border-top: 1px solid var(--faint);
      padding: 28px 48px;
      display: flex;
      justify-content: space-between;
      margin-top: 60px;
    }
    footer p { font-size: 10px; color: var(--white); letter-spacing: 0.15em; }

    @media (max-width: 768px) {
      nav { padding: 18px 24px; }
      .hero { padding: 100px 24px 40px; }
      .gallery { padding: 24px; grid-template-columns: 1fr; gap: 2px; }
      footer { padding: 24px; flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Samuel Ferla</a>
  <a href="index.html" class="back-link">← Torna al portfolio</a>
</nav>

<div class="hero">
  <div class="hero-left">
    <p class="hero-eyebrow">Galleria · 2026</p>
    <h1>Primavera</h1>
    <p class="hero-sub">Cortometraggio · Regia di Samuel Ferla</p>
  </div>
  <a href="index.html" class="back-link" style="margin-bottom:12px;">← Torna al portfolio</a>
</div>

<div class="gallery" id="gallery">
  <div class="gallery-item" onclick="openLightbox(0)">
    <img src="images/primavera/p5.png" alt="Primavera - still 1">
  </div>
  <div class="gallery-item" onclick="openLightbox(1)">
    <img src="images/primavera/p4.png" alt="Primavera - still 2">
  </div>
  <div class="gallery-item" onclick="openLightbox(2)">
    <img src="images/primavera/p3.png" alt="Primavera - still 3">
  </div>
  <div class="gallery-item" onclick="openLightbox(3)">
    <img src="images/primavera/p1.png" alt="Primavera - still 4">
  </div>
  <div class="gallery-item" onclick="openLightbox(4)">
    <img src="images/primavera/p6.png" alt="Primavera - still 5">
  </div>
  <div class="gallery-item" onclick="openLightbox(5)">
    <img src="images/primavera/p2.png" alt="Primavera - still 6">
  </div>
</div>

<footer>
  <p>Samuel Ferla &nbsp;·&nbsp; P.I. 02156780898</p>
  <p>© - 2026 Tutti i diritti riservati</p>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-prev" onclick="changeLightbox(-1)">&#8592;</button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-next" onclick="changeLightbox(1)">&#8594;</button>
</div>

<script>
const images = [
  "images/primavera/p5.png",
  "images/primavera/p4.png",
  "images/primavera/p3.png",
  "images/primavera/p1.png",
  "images/primavera/p6.png",
  "images/primavera/p2.png",
];
let current = 0;

function openLightbox(i) {
  current = i;
  document.getElementById('lightboxImg').src = images[i];
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function changeLightbox(dir) {
  current = (current + dir + images.length) % images.length;
  document.getElementById('lightboxImg').src = images[current];
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') changeLightbox(1);
  if (e.key === 'ArrowLeft') changeLightbox(-1);
});
</script>
</body>
</html>
